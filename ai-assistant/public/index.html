<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>睡吧失眠助手 Playground</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --danger: #dc2626;
      --ok: #059669;
      --warn: #d97706;
      --shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    .sub {
      color: var(--muted);
      margin-bottom: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 18px;
      align-items: start;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .section-title {
      font-size: 14px;
      font-weight: 700;
      margin: 0 0 10px;
      color: #111827;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      font-weight: 600;
    }
    textarea {
      width: 100%;
      min-height: 220px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      resize: vertical;
      font: inherit;
      line-height: 1.55;
      background: #fff;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
      background: #e5e7eb;
      color: #111827;
    }
    button.primary {
      background: var(--primary);
      color: #fff;
    }
    button.ghost {
      background: #fff;
      border: 1px solid var(--border);
    }
    button.small {
      padding: 8px 10px;
      font-size: 13px;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .chip {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    .toggles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f9fafb;
      border: 1px solid var(--border);
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 14px;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 13px;
      background: #f3f4f6;
      color: #111827;
      border: 1px solid var(--border);
    }
    .pill.ok { background: #ecfdf5; color: var(--ok); border-color: #a7f3d0; }
    .pill.warn { background: #fffbeb; color: var(--warn); border-color: #fde68a; }
    .pill.danger { background: #fef2f2; color: var(--danger); border-color: #fecaca; }
    .answer {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.7;
      font-size: 15px;
      min-height: 180px;
    }
    .list {
      margin: 0;
      padding-left: 18px;
      line-height: 1.65;
    }
    details {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      background: #fcfcfd;
      margin-top: 12px;
    }
    summary {
      cursor: pointer;
      font-weight: 600;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #0f172a;
      color: #e2e8f0;
      padding: 14px;
      border-radius: 10px;
      overflow: auto;
      font-size: 12px;
      line-height: 1.5;
      margin-top: 10px;
    }
    .muted { color: var(--muted); font-size: 13px; }
    .footer-actions { margin-top: 14px; }
    a { color: var(--primary); }

    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
      textarea { min-height: 180px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>睡吧失眠助手 Playground</h1>
    <div class="sub">内部测试台：模拟用户提问、切换 LLM / debug、查看回答与检索依据。</div>

    <div class="grid">
      <section class="card">
        <div class="section-title">提问面板</div>
        <label for="question">用户问题</label>
        <textarea id="question" placeholder="比如：最近回到学校宿舍后又开始入睡困难，越想早点睡越清醒，白天压力其实不算特别大，该怎么办？"></textarea>

        <div class="chips" id="examples"></div>

        <div class="toggles">
          <label class="toggle"><input type="checkbox" id="useLlm" checked /> 使用 LLM</label>
          <label class="toggle"><input type="checkbox" id="debug" /> Debug 模式</label>
        </div>

        <div class="row">
          <button class="primary" id="askBtn">发送提问</button>
          <button class="ghost" id="clearBtn" type="button">清空</button>
        </div>

        <div class="row footer-actions">
          <button class="small" id="copyQBtn" type="button">复制问题</button>
          <button class="small" id="copyABtn" type="button">复制回答</button>
          <button class="small" id="copyQABtn" type="button">复制问题+回答</button>
        </div>
      </section>

      <section class="card">
        <div class="section-title">结果面板</div>
        <div class="meta">
          <span class="pill" id="modePill">mode: -</span>
          <span class="pill" id="riskPill">risk: -</span>
          <span class="pill" id="llmPill">llm: -</span>
        </div>

        <h3 style="margin:0 0 10px;">回答</h3>
        <div class="answer" id="answer">（等待请求）</div>

        <h3 style="margin:18px 0 10px;">推荐阅读</h3>
        <ul class="list" id="articles">
          <li class="muted">（等待请求）</li>
        </ul>

        <details>
          <summary>References</summary>
          <pre id="refs">（仅 debug 模式显示）</pre>
        </details>

        <details>
          <summary>Prompt Preview</summary>
          <pre id="prompt">（仅 debug 模式显示）</pre>
        </details>

        <details>
          <summary>Raw JSON</summary>
          <pre id="raw">（等待请求）</pre>
        </details>

        <div id="feedbackPanel" style="display:none; margin-top:18px; border-top: 1px solid var(--border); padding-top:16px;">
          <div class="section-title">反馈（帮助改进 agent）</div>
          <div class="row" style="margin-top:0;">
            <button class="ghost" id="fbGood" type="button" style="font-size:20px;">👍 有用</button>
            <button class="ghost" id="fbBad" type="button" style="font-size:20px;">👎 需改进</button>
          </div>
          <div id="fbDetail" style="display:none; margin-top:12px;">
            <label style="margin-bottom:4px;">哪里不好？（选一个主要原因）</label>
            <div class="chips" id="fbReasons"></div>
            <label style="margin-top:12px; margin-bottom:4px;">补充说明（可选）</label>
            <textarea id="fbNotes" rows="3" style="min-height:80px;" placeholder="比如：应该先问用户失眠多久了再给建议…"></textarea>
            <div class="row">
              <button class="primary small" id="fbSubmit" type="button">提交反馈</button>
            </div>
          </div>
          <div id="fbDone" style="display:none; color:var(--ok); margin-top:10px; font-size:14px;">✓ 反馈已保存</div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const examples = [
      '最近回到学校宿舍后又开始入睡困难，越想早点睡越清醒，白天压力其实不算特别大，该怎么办？',
      '产后带孩子后开始失眠，尤其是晚上要哄睡的时候特别焦虑，一到那个时间点就紧张，该怎么办？',
      '我现在很怕停安眠药，一想到减药就心慌，担心自己以后再也睡不着，怎么办？',
      '最近总是凌晨三四点醒来，醒了以后脑子特别清醒，然后开始担心第二天状态，这怎么办？',
      '失眠很久了，有时候甚至会冒出不想活的念头，我该怎么办？'
    ];

    const questionEl = document.getElementById('question');
    const useLlmEl = document.getElementById('useLlm');
    const debugEl = document.getElementById('debug');
    const answerEl = document.getElementById('answer');
    const articlesEl = document.getElementById('articles');
    const refsEl = document.getElementById('refs');
    const promptEl = document.getElementById('prompt');
    const rawEl = document.getElementById('raw');
    const modePill = document.getElementById('modePill');
    const riskPill = document.getElementById('riskPill');
    const llmPill = document.getElementById('llmPill');

    function setExamples() {
      const box = document.getElementById('examples');
      examples.forEach(text => {
        const btn = document.createElement('button');
        btn.className = 'chip';
        btn.type = 'button';
        btn.textContent = text.slice(0, 18) + (text.length > 18 ? '…' : '');
        btn.title = text;
        btn.onclick = () => { questionEl.value = text; };
        box.appendChild(btn);
      });
    }

    function setPill(el, text, cls = '') {
      el.className = 'pill' + (cls ? ' ' + cls : '');
      el.textContent = text;
    }

    async function copyText(text) {
      if (!text) return alert('没有可复制内容');
      await navigator.clipboard.writeText(text);
      alert('已复制');
    }

    function renderArticles(items = []) {
      if (!items.length) {
        articlesEl.innerHTML = '<li class="muted">无</li>';
        return;
      }
      articlesEl.innerHTML = items.map(x => `<li><a href="${x.url}" target="_blank" rel="noreferrer">${x.title}</a><br><span class="muted" style="user-select:all;word-break:break-all;">${x.url}</span></li>`).join('');
    }

    async function ask() {
      const question = questionEl.value.trim();
      if (!question) return alert('先输入问题');

      answerEl.textContent = '请求中...';
      refsEl.textContent = '请求中...';
      promptEl.textContent = '请求中...';
      rawEl.textContent = '请求中...';
      renderArticles([]);
      setPill(modePill, 'mode: ...');
      setPill(riskPill, 'risk: ...');
      setPill(llmPill, 'llm: ...');

      try {
        const res = await fetch('/ask', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({
            question,
            debug: debugEl.checked,
            use_llm: useLlmEl.checked,
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '请求失败');

        answerEl.textContent = data.answer || '';
        renderArticles(data.related_articles || []);
        refsEl.textContent = JSON.stringify(data.references || [], null, 2);
        promptEl.textContent = JSON.stringify(data.prompt_preview || [], null, 2);
        rawEl.textContent = JSON.stringify(data, null, 2);

        const modeCls = data.mode === 'llm' ? 'ok' : (String(data.mode || '').includes('fallback') ? 'warn' : '');
        const riskCls = data.risk_level === 'high' ? 'danger' : (data.risk_level === 'normal' ? 'ok' : '');
        const llmText = data.llm?.model ? `llm: ${data.llm.provider}/${data.llm.model}` : `llm: ${data.llm_available ? 'available' : 'off'}`;

        setPill(modePill, `mode: ${data.mode || '-'}`, modeCls);
        setPill(riskPill, `risk: ${data.risk_level || '-'}`, riskCls);
        setPill(llmPill, llmText, data.llm_available ? 'ok' : '');
      } catch (err) {
        answerEl.textContent = `错误：${err.message}`;
        refsEl.textContent = '';
        promptEl.textContent = '';
        rawEl.textContent = '';
        setPill(modePill, 'mode: error', 'danger');
      }
    }

    document.getElementById('askBtn').onclick = ask;
    document.getElementById('clearBtn').onclick = () => {
      questionEl.value = '';
      answerEl.textContent = '（等待请求）';
      refsEl.textContent = '（仅 debug 模式显示）';
      promptEl.textContent = '（仅 debug 模式显示）';
      rawEl.textContent = '（等待请求）';
      articlesEl.innerHTML = '<li class="muted">（等待请求）</li>';
      setPill(modePill, 'mode: -');
      setPill(riskPill, 'risk: -');
      setPill(llmPill, 'llm: -');
    };
    document.getElementById('copyQBtn').onclick = () => copyText(questionEl.value.trim());
    document.getElementById('copyABtn').onclick = () => copyText(answerEl.textContent.trim());
    document.getElementById('copyQABtn').onclick = () => copyText(`问题：\n${questionEl.value.trim()}\n\n回答：\n${answerEl.textContent.trim()}`);

    setExamples();

    // --- feedback panel ---
    const fbReasons = [
      '不贴合我的情况',
      '建议不够具体',
      '语气像模板/客服',
      '引用了不相关内容',
      '触及医疗/药物边界',
      '该提醒线下求助但没提醒',
    ];
    const fbReasonsEl = document.getElementById('fbReasons');
    const fbDetailEl = document.getElementById('fbDetail');
    const fbDoneEl = document.getElementById('fbDone');
    const fbNotesEl = document.getElementById('fbNotes');
    let fbSelectedRating = null;
    let fbSelectedReason = null;

    fbReasons.forEach(text => {
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.type = 'button';
      btn.textContent = text;
      btn.onclick = () => {
        fbSelectedReason = text;
        fbReasonsEl.querySelectorAll('.chip').forEach(c => c.style.background = '#fff');
        btn.style.background = 'var(--primary-soft)';
      };
      fbReasonsEl.appendChild(btn);
    });

    function showFeedbackPanel() {
      document.getElementById('feedbackPanel').style.display = 'block';
      fbDetailEl.style.display = 'none';
      fbDoneEl.style.display = 'none';
      fbSelectedRating = null;
      fbSelectedReason = null;
      fbNotesEl.value = '';
      fbReasonsEl.querySelectorAll('.chip').forEach(c => c.style.background = '#fff');
    }

    document.getElementById('fbGood').onclick = async () => {
      fbSelectedRating = 'good';
      await submitFeedback();
    };
    document.getElementById('fbBad').onclick = () => {
      fbSelectedRating = 'bad';
      fbDetailEl.style.display = 'block';
      fbDoneEl.style.display = 'none';
    };
    document.getElementById('fbSubmit').onclick = () => submitFeedback();

    async function submitFeedback() {
      try {
        await fetch('/feedback', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({
            question: questionEl.value.trim(),
            answer: answerEl.textContent.trim(),
            rating: fbSelectedRating,
            reason: fbSelectedReason,
            notes: fbNotesEl.value.trim(),
          })
        });
        fbDetailEl.style.display = 'none';
        fbDoneEl.style.display = 'block';
      } catch (e) {
        alert('反馈提交失败: ' + e.message);
      }
    }

    // hook into ask() to show feedback panel after each answer
    const origAsk = ask;
    const patchedAsk = async function() {
      document.getElementById('feedbackPanel').style.display = 'none';
      await origAsk();
      if (answerEl.textContent && !answerEl.textContent.startsWith('错误')) {
        showFeedbackPanel();
      }
    };
    document.getElementById('askBtn').onclick = patchedAsk;
  </script>
</body>
</html>
